    <script src="data.js"></script>
    <script src="icons.js"></script>
    <script>
        let currentCategory = 'all';
        
        // 隐藏的分类（不显示但保留数据）
        const hiddenCategories = ['交易所'];
        
        // 管理员密码（可自行修改）
        const ADMIN_PASSWORD = 'xiaji2026';
        
        // 检查管理员登录状态
        function isAdminLoggedIn() {
            return localStorage.getItem('xj_admin') === 'true';
        }
        
        // 更新管理功能显示状态
        function updateAdminUI() {
            const isLoggedIn = isAdminLoggedIn();
            const loginBtn = document.getElementById('adminLoginBtn');
            const adminPanel = document.getElementById('adminPanel');
            const adminActions = document.getElementById('adminActions');
            
            if (isLoggedIn) {
                loginBtn.classList.add('admin-hidden');
                adminPanel.classList.remove('admin-hidden');
                adminActions.classList.remove('admin-hidden');
            } else {
                loginBtn.classList.remove('admin-hidden');
                adminPanel.classList.add('admin-hidden');
                adminActions.classList.add('admin-hidden');
            }
            
            // 重新渲染内容以更新卡片操作按钮
            renderContent(currentCategory);
        }
        
        // 打开登录模态框
        function openLoginModal() {
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginModal').classList.add('active');
            setTimeout(() => document.getElementById('adminPassword').focus(), 100);
        }
        
        // 关闭登录模态框
        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }
        
        // 处理登录回车键
        function handleLoginKey(event) {
            if (event.key === 'Enter') {
                adminLogin();
            }
        }
        
        // 管理员登录
        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('xj_admin', 'true');
                closeLoginModal();
                updateAdminUI();
                showToast('登录成功', 'success');
            } else {
                showToast('密码错误', 'error');
            }
        }
        
        // 管理员登出
        function adminLogout() {
            localStorage.removeItem('xj_admin');
            updateAdminUI();
            showToast('已退出管理员模式', 'success');
        }
        
        // 初始化：从 localStorage 加载数据或使用默认数据
        function initData() {
            const saved = localStorage.getItem('bigclaw_data');
            const savedVersion = localStorage.getItem('bigclaw_version');
            const currentVersion = siteData.version || '1.0.0';
            
            // 如果版本不同，清除旧缓存
            if (savedVersion !== currentVersion) {
                localStorage.removeItem('bigclaw_data');
                localStorage.setItem('bigclaw_version', currentVersion);
                console.log('数据版本已更新，已清除旧缓存');
                return;
            }
            
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.categories && parsed.categories.length > 0) {
                        siteData = parsed;
                    }
                } catch(e) {
                    console.error('加载数据失败', e);
                }
            }
        }
        
        // 保存数据到 localStorage
        function saveData() {
            siteData.version = siteData.version || '1.1.0';
            localStorage.setItem('bigclaw_data', JSON.stringify(siteData));
            localStorage.setItem('bigclaw_version', siteData.version);
        }
        
        function renderCategoryNav() {
            const nav = document.getElementById('categoryNav');
            let totalCount = 0;
            
            let html = '<div class="nav-item active" data-category="all" onclick="selectCategory(\'all\')">';
            html += '<span>📋</span><span>全部网站</span>';
            
            for (let i = 0; i < siteData.categories.length; i++) {
                // 统计时也过滤隐藏分类
                if (!hiddenCategories.includes(siteData.categories[i].title)) {
                    totalCount += siteData.categories[i].links.length;
                }
            }
            html += '<span class="count">' + totalCount + '</span></div>';
            
            for (let i = 0; i < siteData.categories.length; i++) {
                const cat = siteData.categories[i];
                // 跳过隐藏的分类
                if (hiddenCategories.includes(cat.title)) continue;
                html += '<div class="nav-item" data-category="' + cat.title + '" onclick="selectCategory(\'' + cat.title + '\')">';
                html += '<span>' + getCategoryIcon(cat.title) + '</span>';
                html += '<span>' + cat.title + '</span>';
                html += '<span class="count">' + cat.links.length + '</span></div>';
            }
            
            nav.innerHTML = html;
            document.getElementById('totalCount').textContent = totalCount;
        }
        
        function getCategoryIcon(title) {
            const icons = {
                '百虾争鸣': '🦞',
                '云端大虾': '☁️',
                '教程合集': '📚',
                '常用AI': '🤖',
                'Coding Plan': '💻',
                'Maas平台': '🏭',
                '语音大模型': '🎙️',
                'AI音乐创作': '🎵',
                'AI大模型': '🧠',
                'Skills市场': '🛒',
                '综合生态': '🌐',
                'Agent生态': '🤝',
                'Agent支付': '💳',
                '币圈生态': '₿',
                '交易所': '📊',
                'API聚合平台': '🔌',
                'Agent开发平台': '🔧',
                'Agent沙箱': '📦',
                'AI编程工具': '⌨️',
                'AI创作画布': '🎨'
            };
            return icons[title] || '📁';
        }
        
        function getFavicon(url, source) {
            try {
                const urlObj = new URL(url);
                const domain = urlObj.hostname;
                
                // 多个favicon源（优先使用国内可用）
                // icon.horse 在中国更稳定
                const sources = {
                    iconhorse: 'https://icon.horse/icon/' + domain + '?size=64',
                    duckduckgo: 'https://icons.duckduckgo.com/ip3/' + domain + '.ico',
                    clearbit: 'https://logo.clearbit.com/' + domain + '?size=64',
                    yandex: 'https://favicon.yandex.net/favicon/' + domain,
                    google: 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=64'
                };
                
                return sources[source] || sources.iconhorse;
            } catch(e) {
                return '';
            }
        }
        
        // 获取图标：优先使用自定义图标，其次iconMap，最后favicon服务
        function getFaviconDefault(url, siteName, customIcon) {
            // 优先使用自定义图标
            if (customIcon) {
                return customIcon;
            }
            // 其次检查iconMap中是否有该网站的图标
            if (siteName && typeof getIconByName === 'function') {
                const iconUrl = getIconByName(siteName);
                if (iconUrl) {
                    return iconUrl;
                }
            }
            // 最后使用favicon服务（icon.horse在国内更稳定）
            return getFavicon(url, 'iconhorse');
        }
        
        function getTag(url) {
            if (url.includes('github.com')) return '开源';
            if (url.includes('.cn')) return '国内';
            return null;
        }
        
        // 图标加载失败处理 - 尝试备用源
        function handleIconError(img, url, fallbackText) {
            const sources = ['clearbit', 'yandex', 'duckduckgo'];
            const currentSrc = img.src;
            let nextSource = null;
            
            // 检查当前使用的是哪个源，切换到下一个
            if (currentSrc.includes('icon.horse')) {
                nextSource = sources[0];
            } else if (currentSrc.includes('clearbit')) {
                nextSource = sources[1];
            } else if (currentSrc.includes('yandex')) {
                nextSource = sources[2];
            } else if (currentSrc.includes('duckduckgo')) {
                // 所有源都失败了，显示首字母
                showFallbackLetter(img, fallbackText);
                return;
            } else {
                // 其他情况（自定义图标或iconMap图标失败），显示首字母
                showFallbackLetter(img, fallbackText);
                return;
            }
            
            if (nextSource) {
                img.onerror = null; // 先清除错误处理
                setTimeout(function() {
                    img.onerror = function() { handleIconError(this, url, fallbackText); };
                    img.src = getFavicon(url, nextSource);
                }, 100);
            }
        }
        
        // 显示首字母作为后备
        function showFallbackLetter(img, text) {
            const parent = img.parentElement;
            parent.innerHTML = '<span style="font-size:18px;font-weight:600;color:#ff6b35;">' + text + '</span>';
        }
        
        function renderContent(category) {
            const main = document.getElementById('mainContent');
            let html = '';
            
            let categories = category === 'all' ? siteData.categories : 
                siteData.categories.filter(c => c.title === category);
            
            // 过滤掉隐藏的分类
            categories = categories.filter(c => !hiddenCategories.includes(c.title));
            
            for (let i = 0; i < categories.length; i++) {
                const cat = categories[i];
                html += '<section class="category-section" id="' + cat.title + '">';
                html += '<div class="category-header">';
                html += '<div class="category-icon">' + getCategoryIcon(cat.title) + '</div>';
                html += '<h2 class="category-title">' + cat.title + '</h2>';
                html += '<span class="category-count">' + cat.links.length + ' 个网站</span>';
                html += '</div>';
                html += '<div class="links-grid">';
                
                for (let j = 0; j < cat.links.length; j++) {
                    const link = cat.links[j];
                    const favicon = getFaviconDefault(link.url, link.name, link.icon);
                    const tag = getTag(link.url);
                    const domain = link.name.charAt(0).toUpperCase();
                    
                    html += '<div class="link-card" id="card-' + cat.title + '-' + j + '">';
                    
                    // 只有管理员登录后才显示操作按钮
                    if (isAdminLoggedIn()) {
                        html += '<div class="card-actions">';
                        html += '<button class="btn-edit" onclick="openEditModal(\'' + cat.title + '\', ' + j + ')" title="编辑">✏️</button>';
                        html += '<button class="btn-delete" onclick="openDeleteModal(\'' + cat.title + '\', ' + j + ')" title="删除">🗑️</button>';
                        html += '</div>';
                    }
                    
                    html += '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer">';
                    html += '<div class="link-icon"><img src="' + favicon + '" alt="" onerror="handleIconError(this, \'' + link.url + '\', \'' + domain + '\')"></div>';
                    html += '<div class="link-content">';
                    html += '<div class="link-name">' + link.name;
                    if (tag) html += '<span class="link-tag">' + tag + '</span>';
                    html += '</div>';
                    html += '<div class="link-desc">' + link.description + '</div>';
                    html += '<div class="link-url">' + link.url + '</div>';
                    html += '</div></a></div>';
                }
                
                html += '</div></section>';
            }
            
            main.innerHTML = html;
        }
        
        function selectCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.category === category) {
                    item.classList.add('active');
                }
            });
            
            renderContent(category);
            
            // 移动端自动关闭侧边栏
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }
        
        function handleSearch(event) {
            if (event.key === 'Enter') {
                doSearch();
            }
        }
        
        // 移动端搜索
        function handleMobileSearch(event) {
            if (event.key === 'Enter') {
                const keyword = document.getElementById('mobileSearchInput').value.toLowerCase().trim();
                // 同步到侧边栏搜索框
                document.getElementById('searchInput').value = document.getElementById('mobileSearchInput').value;
                doSearchMobile(keyword);
            }
        }
        
        function doSearchMobile(keyword) {
            if (!keyword) {
                selectCategory(currentCategory);
                return;
            }
            
            const filtered = [];
            for (let i = 0; i < siteData.categories.length; i++) {
                const cat = siteData.categories[i];
                if (hiddenCategories.includes(cat.title)) continue;
                const matchedLinks = [];
                
                for (let j = 0; j < cat.links.length; j++) {
                    const link = cat.links[j];
                    if (link.name.toLowerCase().indexOf(keyword) >= 0 ||
                        link.description.toLowerCase().indexOf(keyword) >= 0 ||
                        link.url.toLowerCase().indexOf(keyword) >= 0) {
                        matchedLinks.push(link);
                    }
                }
                
                if (matchedLinks.length > 0) {
                    filtered.push({ title: cat.title, links: matchedLinks });
                }
            }
            
            const main = document.getElementById('mainContent');
            if (filtered.length === 0) {
                main.innerHTML = '<div style="text-align:center;padding:60px;color:#888;">未找到相关网站</div>';
                return;
            }
            
            let html = '<div style="margin-bottom:30px;"><h1 style="font-size:28px;color:#fff;margin-bottom:8px;">搜索结果</h1>';
            html += '<p style="color:#888;font-size:14px;">找到 ' + filtered.reduce((a, c) => a + c.links.length, 0) + ' 个相关网站</p></div>';
            
            for (let i = 0; i < filtered.length; i++) {
                const cat = filtered[i];
                html += '<section class="category-section">';
                html += '<div class="category-header">';
                html += '<div class="category-icon">' + getCategoryIcon(cat.title) + '</div>';
                html += '<h2 class="category-title">' + cat.title + '</h2>';
                html += '<span class="category-count">' + cat.links.length + ' 个结果</span>';
                html += '</div>';
                html += '<div class="links-grid">';
                
                for (let j = 0; j < cat.links.length; j++) {
                    const link = cat.links[j];
                    const favicon = getFaviconDefault(link.url, link.name, link.icon);
                    const tag = getTag(link.url);
                    const domain = link.name.charAt(0).toUpperCase();
                    
                    html += '<div class="link-card">';
                    
                    if (isAdminLoggedIn()) {
                        html += '<div class="card-actions">';
                        html += '<button class="btn-edit" onclick="openEditModal(\'' + cat.title + '\', ' + j + ')" title="编辑">✏️</button>';
                        html += '<button class="btn-delete" onclick="openDeleteModal(\'' + cat.title + '\', ' + j + ')" title="删除">🗑️</button>';
                        html += '</div>';
                    }
                    
                    html += '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer">';
                    html += '<div class="link-icon"><img src="' + favicon + '" alt="" onerror="handleIconError(this, \'' + link.url + '\', \'' + domain + '\')"></div>';
                    html += '<div class="link-content">';
                    html += '<div class="link-name">' + link.name;
                    if (tag) html += '<span class="link-tag">' + tag + '</span>';
                    html += '</div>';
                    html += '<div class="link-desc">' + link.description + '</div>';
                    html += '<div class="link-url">' + link.url + '</div>';
                    html += '</div></a></div>';
                }
                
                html += '</div></section>';
            }
            
            main.innerHTML = html;
        }
        
        function doSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!keyword) {
                selectCategory(currentCategory);
                return;
            }
            
            const filtered = [];
            for (let i = 0; i < siteData.categories.length; i++) {
                const cat = siteData.categories[i];
                const matchedLinks = [];
                
                for (let j = 0; j < cat.links.length; j++) {
                    const link = cat.links[j];
                    if (link.name.toLowerCase().indexOf(keyword) >= 0 ||
                        link.description.toLowerCase().indexOf(keyword) >= 0 ||
                        link.url.toLowerCase().indexOf(keyword) >= 0) {
                        matchedLinks.push(link);
                    }
                }
                
                if (matchedLinks.length > 0) {
                    filtered.push({ title: cat.title, links: matchedLinks });
                }
            }
            
            const main = document.getElementById('mainContent');
            if (filtered.length === 0) {
                main.innerHTML = '<div style="text-align:center;padding:60px;color:#888;">未找到相关网站</div>';
                return;
            }
            
            let html = '<div style="margin-bottom:30px;"><h1 style="font-size:28px;color:#fff;margin-bottom:8px;">搜索结果</h1>';
            html += '<p style="color:#888;font-size:14px;">找到 ' + filtered.reduce((a, c) => a + c.links.length, 0) + ' 个相关网站</p></div>';
            
            for (let i = 0; i < filtered.length; i++) {
                const cat = filtered[i];
                html += '<section class="category-section">';
                html += '<div class="category-header">';
                html += '<div class="category-icon">' + getCategoryIcon(cat.title) + '</div>';
                html += '<h2 class="category-title">' + cat.title + '</h2>';
                html += '<span class="category-count">' + cat.links.length + ' 个结果</span>';
                html += '</div>';
                html += '<div class="links-grid">';
                
                for (let j = 0; j < cat.links.length; j++) {
                    const link = cat.links[j];
                    const favicon = getFaviconDefault(link.url, link.name, link.icon);
                    const tag = getTag(link.url);
                    const domain = link.name.charAt(0).toUpperCase();
                    
                    html += '<div class="link-card">';
                    
                    // 只有管理员登录后才显示操作按钮
                    if (isAdminLoggedIn()) {
                        html += '<div class="card-actions">';
                        html += '<button class="btn-edit" onclick="openEditModal(\'' + cat.title + '\', ' + j + ')" title="编辑">✏️</button>';
                        html += '<button class="btn-delete" onclick="openDeleteModal(\'' + cat.title + '\', ' + j + ')" title="删除">🗑️</button>';
                        html += '</div>';
                    }
                    
                    html += '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer">';
                    html += '<div class="link-icon"><img src="' + favicon + '" alt="" onerror="handleIconError(this, \'' + link.url + '\', \'' + domain + '\')"></div>';
                    html += '<div class="link-content">';
                    html += '<div class="link-name">' + link.name;
                    if (tag) html += '<span class="link-tag">' + tag + '</span>';
                    html += '</div>';
                    html += '<div class="link-desc">' + link.description + '</div>';
                    html += '<div class="link-url">' + link.url + '</div>';
                    html += '</div></a></div>';
                }
                
                html += '</div></section>';
            }
            
            main.innerHTML = html;
        }
        
        // 模态框操作
        function openAddModal() {
            if (!isAdminLoggedIn()) {
                showToast('请先登录管理员账号', 'error');
                return;
            }
            document.getElementById('modalTitle').textContent = '添加网站';
            document.getElementById('editCategory').value = '';
            document.getElementById('editIndex').value = '-1';
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
            document.getElementById('siteDesc').value = '';
            document.getElementById('siteIcon').value = '';
            
            // 填充分类选项（过滤隐藏分类）
            const select = document.getElementById('siteCategory');
            select.innerHTML = siteData.categories
                .filter(c => !hiddenCategories.includes(c.title))
                .map(c => '<option value="' + c.title + '">' + c.title + '</option>')
                .join('');
            
            document.getElementById('modal').classList.add('active');
        }
        
        function openEditModal(category, index) {
            if (!isAdminLoggedIn()) {
                showToast('请先登录管理员账号', 'error');
                return;
            }
            const cat = siteData.categories.find(c => c.title === category);
            if (!cat) return;
            
            const link = cat.links[index];
            if (!link) return;
            
            document.getElementById('modalTitle').textContent = '编辑网站';
            document.getElementById('editCategory').value = category;
            document.getElementById('editIndex').value = index;
            document.getElementById('siteName').value = link.name;
            document.getElementById('siteUrl').value = link.url;
            document.getElementById('siteDesc').value = link.description;
            document.getElementById('siteIcon').value = link.icon || '';
            
            // 填充分类选项并选中当前分类（过滤隐藏分类）
            const select = document.getElementById('siteCategory');
            select.innerHTML = siteData.categories
                .filter(c => !hiddenCategories.includes(c.title))
                .map(c => '<option value="' + c.title + '"' + (c.title === category ? ' selected' : '') + '>' + c.title + '</option>')
                .join('');
            
            document.getElementById('modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function saveSite() {
            const name = document.getElementById('siteName').value.trim();
            const url = document.getElementById('siteUrl').value.trim();
            const desc = document.getElementById('siteDesc').value.trim();
            const icon = document.getElementById('siteIcon').value.trim();
            const category = document.getElementById('siteCategory').value;
            const editCategory = document.getElementById('editCategory').value;
            const editIndex = parseInt(document.getElementById('editIndex').value);
            
            if (!name || !url || !desc || !category) {
                showToast('请填写所有必填项', 'error');
                return;
            }
            
            // 验证URL格式
            try {
                new URL(url);
            } catch(e) {
                showToast('请输入有效的网站地址', 'error');
                return;
            }
            
            const newLink = { name: name, url: url, description: desc };
            if (icon) {
                newLink.icon = icon;
            }
            
            let targetCategory = category;
            let targetIndex = -1;
            
            if (editIndex >= 0 && editCategory) {
                // 编辑模式
                const oldCat = siteData.categories.find(c => c.title === editCategory);
                if (oldCat && oldCat.links[editIndex]) {
                    if (category === editCategory) {
                        // 同分类更新
                        oldCat.links[editIndex] = newLink;
                        targetIndex = editIndex;
                    } else {
                        // 移动到新分类
                        oldCat.links.splice(editIndex, 1);
                        const newCat = siteData.categories.find(c => c.title === category);
                        if (newCat) {
                            newCat.links.push(newLink);
                            targetIndex = newCat.links.length - 1;
                        }
                    }
                }
                showToast('网站已更新', 'success');
            } else {
                // 添加模式
                const cat = siteData.categories.find(c => c.title === category);
                if (cat) {
                    cat.links.push(newLink);
                    targetIndex = cat.links.length - 1;
                    showToast('网站已添加', 'success');
                }
            }
            
            saveData();
            renderCategoryNav();
            
            // 切换到目标分类并滚动到新网站位置
            selectCategory(targetCategory);
            
            // 延迟滚动，等待渲染完成
            setTimeout(function() {
                const cardId = 'card-' + targetCategory + '-' + targetIndex;
                const card = document.getElementById(cardId);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // 高亮效果
                    card.style.boxShadow = '0 0 0 2px #ff6b35';
                    setTimeout(function() {
                        card.style.boxShadow = '';
                    }, 2000);
                }
            }, 100);
            
            closeModal();
        }
        
        function openDeleteModal(category, index) {
            if (!isAdminLoggedIn()) {
                showToast('请先登录管理员账号', 'error');
                return;
            }
            document.getElementById('deleteCategory').value = category;
            document.getElementById('deleteIndex').value = index;
            document.getElementById('deleteModal').classList.add('active');
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
        }
        
        function confirmDelete() {
            const category = document.getElementById('deleteCategory').value;
            const index = parseInt(document.getElementById('deleteIndex').value);
            
            const cat = siteData.categories.find(c => c.title === category);
            if (cat && cat.links[index]) {
                cat.links.splice(index, 1);
                saveData();
                renderCategoryNav();
                renderContent(currentCategory);
                showToast('网站已删除', 'success');
            }
            
            closeDeleteModal();
        }
        
        // 导出数据
        function exportData() {
            if (!isAdminLoggedIn()) {
                showToast('请先登录管理员账号', 'error');
                return;
            }
            const dataStr = JSON.stringify(siteData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bigclaw_data_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出', 'success');
        }
        
        // 导入数据
        function importData(event) {
            if (!isAdminLoggedIn()) {
                showToast('请先登录管理员账号', 'error');
                return;
            }
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.categories && Array.isArray(data.categories)) {
                        siteData = data;
                        saveData();
                        renderCategoryNav();
                        renderContent('all');
                        showToast('数据已导入', 'success');
                    } else {
                        showToast('无效的数据格式', 'error');
                    }
                } catch(err) {
                    showToast('导入失败：' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 重置文件输入
        }
        
        // Toast 提示
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 收藏提示
        function closeBookmarkTip() {
            const tip = document.getElementById('bookmarkTip');
            tip.style.display = 'none';
            localStorage.setItem('bookmarkTipClosed', 'true');
        }
        
        // 检查是否已关闭收藏提示
        function checkBookmarkTip() {
            if (localStorage.getItem('bookmarkTipClosed') === 'true') {
                document.getElementById('bookmarkTip').style.display = 'none';
            }
        }
        
        // 移动端侧边栏控制
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }
        
        // 初始化
        initData();
        renderCategoryNav();
        renderContent('all');
        checkBookmarkTip();
        updateAdminUI();
    </script>
</body>
</html>
